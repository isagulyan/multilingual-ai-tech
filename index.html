<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#3B82F6" />

    <!-- SEO -->
    <title>TechPulse Media - AI, Technology, SaaS & Business Intelligence</title>
    <meta name="description" content="The world's leading technology and business media platform. Expert insights on AI, software, cybersecurity, cloud computing, digital marketing, investing, and finance." />
    <meta name="keywords" content="AI, technology news, SaaS reviews, web hosting, VPN, cybersecurity, digital marketing, business software, investing, personal finance" />
    <link rel="canonical" href="https://techpulse.media" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://techpulse.media" />
    <meta property="og:title" content="TechPulse Media - AI, Technology, SaaS & Business Intelligence" />
    <meta property="og:description" content="Expert insights on AI, software, cybersecurity, cloud computing, digital marketing, investing, and finance for technology leaders." />
    <meta property="og:image" content="https://images.pexels.com/photos/8386434/pexels-photo-8386434.jpeg?auto=compress&cs=tinysrgb&w=1200" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://techpulse.media" />
    <meta name="twitter:title" content="TechPulse Media - AI, Technology, SaaS & Business Intelligence" />
    <meta name="twitter:description" content="Expert insights on AI, software, cybersecurity, cloud computing, digital marketing, investing, and finance." />
    <meta name="twitter:image" content="https://images.pexels.com/photos/8386434/pexels-photo-8386434.jpeg?auto=compress&cs=tinysrgb&w=1200" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "TechPulse Media",
      "url": "https://techpulse.media",
      "logo": "https://techpulse.media/logo.svg",
      "description": "The world's leading technology and business media platform",
      "sameAs": [
        "https://twitter.com/techpulsemedia",
        "https://linkedin.com/company/techpulse-media",
        "https://youtube.com/@techpulsemedia"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer Support",
        "email": "support@techpulse.media"
      }
    }
    </script>

    <!-- Additional Meta Tags -->
    <meta name="author" content="TechPulse Media" />
    <meta name="publisher" content="TechPulse Media" />
    <meta name="language" content="English" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://images.pexels.com" />

    <!-- DNS Prefetch -->
    <link rel="dns-prefetch" href="https://images.pexels.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
